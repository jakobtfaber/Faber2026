name: Sync to Overleaf

# Mirrors the manuscript to the Overleaf project on every push to main, so
# GitHub stays the single source of truth and Overleaf updates hands-off.
#
# One-time setup (see README):
#   1. Overleaf -> Account Settings -> Git integration -> generate a Git token.
#   2. Add it as a repo secret:  gh secret set OVERLEAF_GIT_TOKEN -R jakobtfaber/Faber2026
#   3. (Recommended) Unlink the project from Overleaf's GitHub Sync so the git
#      bridge is the only writer.
#
# The pipeline/ submodule and build artifacts are excluded — Overleaf compiles
# main.tex + sections/ at the project root and ignores the submodule anyway.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: overleaf-sync
  cancel-in-progress: false

jobs:
  overleaf-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Mirror manuscript to Overleaf git bridge
        env:
          TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
          PROJECT_ID: 6a342d18e1d0da94aa746795
        run: |
          set -euo pipefail
          if [ -z "${TOKEN}" ]; then
            echo "OVERLEAF_GIT_TOKEN secret is not set — see .github/workflows/overleaf-sync.yml header." >&2
            exit 1
          fi
          # Header auth (user 'git', token as password) instead of inline-URL
          # credentials, which curl rejects ("malformed URL") for tokens
          # containing URL-reserved characters.
          AUTH=$(printf 'git:%s' "${TOKEN}" | base64 | tr -d '\n')
          echo "::add-mask::${AUTH}"
          git clone --quiet -c http.extraheader="Authorization: Basic ${AUTH}" \
            "https://git.overleaf.com/${PROJECT_ID}" /tmp/overleaf

          # Excluded paths are protected from rsync --delete, so remove stale
          # agent-local files from the Overleaf clone explicitly before mirroring.
          rm -rf \
            /tmp/overleaf/.agents \
            /tmp/overleaf/.claude \
            /tmp/overleaf/.codex \
            /tmp/overleaf/.cursor \
            /tmp/overleaf/.entire \
            /tmp/overleaf/.remember \
            /tmp/overleaf/.superpowers \
            /tmp/overleaf/AGENTS.md \
            /tmp/overleaf/CLAUDE.md \
            /tmp/overleaf/GEMINI.md

          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'pipeline/' \
            --exclude '.github/' \
            --exclude '.agents/' \
            --exclude '.claude/' \
            --exclude '.codex/' \
            --exclude '.cursor/' \
            --exclude '.entire/' \
            --exclude '.remember/' \
            --exclude '.superpowers/' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            --exclude 'GEMINI.md' \
            --exclude '.olignore' \
            --exclude '*.pdf' --exclude '*.aux' --exclude '*.log' --exclude '*.bbl' \
            --exclude '*.blg' --exclude '*.out' --exclude '*.toc' --exclude '*.synctex.gz' \
            ./ /tmp/overleaf/

          if find /tmp/overleaf -maxdepth 1 \
            \( -name '.agents' -o -name '.claude' -o -name '.codex' \
            -o -name '.cursor' -o -name '.entire' -o -name '.remember' \
            -o -name '.superpowers' -o -name 'AGENTS.md' \
            -o -name 'CLAUDE.md' -o -name 'GEMINI.md' \) \
            -print -quit | grep -q .; then
            echo "Agent-local paths remain in Overleaf clone after sync." >&2
            exit 1
          fi

          cd /tmp/overleaf
          git add -A
          if git diff --cached --quiet; then
            echo "Overleaf already up to date."
            exit 0
          fi
          git -c user.name="GitHub Actions" -c user.email="actions@users.noreply.github.com" \
            commit -m "Sync from GitHub @ ${GITHUB_SHA::7}"
          git push origin HEAD:main
