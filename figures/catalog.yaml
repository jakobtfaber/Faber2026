# Manuscript figure regeneration catalog.
# Source of truth for `scripts/figure_flow.py` / `make figures`.
# Cross-check: repro_manifest.csv rows (repro_output) and figure_review/slots.json.
schema_version: 1

figures:
  - id: dm_host_posteriors
    tex: fig:dm_host_posteriors
    manuscript: true
    clone_ok: true
    repro_output: figures/dm_host_posteriors.pdf
    producer:
      argv:
        - conda
        - run
        - -n
        - flits
        - --no-capture-output
        - python
        - scripts/dm_budget_uncertainty.py
      cwd: .
    inputs:
      - pipeline/galaxies/foreground/budget_table_data.json
      - analysis/dm-joint-phase-v2/manuscript_dm_catalog.csv
      - scripts/dm_budget_intervening_systems.csv
      - scripts/phineas_halo_crossing_inputs.csv
    outputs:
      - figures/dm_host_posteriors.pdf
    depends_on: []
    approval_slot: null

  - id: ne2025_mw
    tex: fig:ne2025_mw
    manuscript: true
    clone_ok: true
    repro_output: figures/ne2025_mw_characterization_nside32.pdf
    producer:
      argv:
        - conda
        - run
        - -n
        - flits
        - --no-capture-output
        - python
        - scripts/plot_ne2025_mw_properties.py
        - --nside
        - "32"
      cwd: .
    inputs:
      - scripts/ne2025_allsky_cache_nside32.npz
    outputs:
      - figures/ne2025_mw_characterization_nside32.pdf
    depends_on: []
    approval_slot: null

  - id: sightline_halo_grid
    tex: fig:sightline_halo_grid
    manuscript: true
    clone_ok: true
    repro_output: figures/sightline_halo_grid.pdf
    producer:
      argv:
        - uv
        - run
        - python
        - galaxies/v2_0/sightline_halo_grid.py
        - --out-dir
        - ../figures
      cwd: pipeline
    inputs: []
    outputs:
      - figures/sightline_halo_grid.pdf
    depends_on: []
    approval_slot: null

  - id: sightline_budget
    tex: null
    manuscript: true
    clone_ok: true
    repro_output: figures/sightline_dm_scattering_budget.pdf
    notes: >-
      Intermediate node. systems_figures.py reads
      pipeline/results/sightline_dm_scattering_budget.csv written by this module.
    producer:
      argv:
        - uv
        - run
        - python
        - -m
        - galaxies.foreground.sightline_budget
      cwd: pipeline
    inputs: []
    outputs:
      - pipeline/results/sightline_dm_scattering_budget.csv
    depends_on: []
    approval_slot: null

  - id: clusters_icm
    tex: fig:clusters_icm
    manuscript: true
    clone_ok: true
    repro_output: figures/clusters_icm.pdf
    producer:
      argv:
        - uv
        - run
        - python
        - galaxies/v2_0/systems_figures.py
        - --out-dir
        - ../figures
      cwd: pipeline
    inputs:
      - pipeline/results/sightline_dm_scattering_budget.csv
    outputs:
      - figures/clusters_icm.pdf
    depends_on:
      - sightline_budget
    approval_slot: null

  - id: assoc_cards_grid
    tex: fig:assoc-cards-grid
    manuscript: true
    clone_ok: true
    repro_output: figures/association_cards/association_card_*.pdf
    producer:
      argv:
        - uv
        - run
        - python
        - crossmatching/plot_association_cards.py
      cwd: pipeline
    inputs: []
    outputs:
      - figures/association_cards/association_card_*.pdf
    depends_on: []
    approval_slot: null

  - id: toa_offset_decomposition
    tex: fig:toa-offset-decomposition
    manuscript: true
