    approval_slot: null

  - id: fig1_gallery
    tex: fig:codetection-data-grid
    manuscript: true
    clone_ok: false
    repro_output: figures/codetection_data_grid.pdf
    notes: >-
      Needs separate ~/Data/Faber2026/chimefrb/CHIME_bursts and
      ~/Data/Faber2026/dsa110/DSA_bursts waterfalls. Writes staging tree only;
      promote via figure_review (never silent overwrite of manuscript PDF).
    producer:
      argv:
        - conda
        - run
        - -n
        - flits
        - --no-capture-output
        - python
        - scripts/plot_codetection_data_grid.py
        - --out
        - figure_review/staging/fig1_gallery/figures/codetection_data_grid
      cwd: .
    inputs:
      - analysis/dm-joint-phase-v2/manuscript_dm_catalog.csv
      - scripts/jointmodel_triptych_manifest.yaml
      - ~/Data/Faber2026/chimefrb/CHIME_bursts
      - ~/Data/Faber2026/dsa110/DSA_bursts
    outputs:
      - figure_review/staging/fig1_gallery/figures/codetection_data_grid.pdf
    manuscript_target: figures/codetection_data_grid.pdf
    candidate_root: figure_review/staging/fig1_gallery
    depends_on: []
    approval_slot: fig1-gallery

  - id: oran_qualified_scint
    tex: null
    manuscript: false
    clone_ok: false
    repro_output: >-
      pipeline/analysis/scintillation-dsa-lorentzian-2026-07-07/results/oran_qualified/figures/oran_dsa_calibrated_measurement.png
    notes: >-
      Pipeline qualification product only — not a dedicated manuscript figure.
      Certified DSA bandwidth evidence lives under oran_qualified/; do not
      treat as an embedded TeX panel.
    producer:
      argv:
        - uv
        - run
        - --frozen
        - python
        - analysis/scintillation-dsa-lorentzian-2026-07-07/run_oran_dsa_measurement.py
      cwd: pipeline
    inputs: []
    outputs:
      - pipeline/analysis/scintillation-dsa-lorentzian-2026-07-07/results/oran_qualified/figures/oran_dsa_calibrated_measurement.png
    depends_on: []
    approval_slot: oran-qualified-scintillation

  # --- manuscript: false (discoverable; do not regen into compiled manuscript) ---

