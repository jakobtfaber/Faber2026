[controller]
repo = "jakobtfaber/Faber2026"
base_branch = "main"
state_dir = "~/.local/state/Faber2026/wayfinder-controller"
worktree_root = "~/Developer/scratch/worktrees/Faber2026-wayfinder-auto"
model = "gpt-5.5"
reasoning_effort = "medium"
max_parallel = 2
timeout_seconds = 14400

[[task]]
id = "fail-close-expanded-catalog"
wave = "first"
ticket = "docs/rse/wayfinder/tickets/expanded-foreground-catalog-repair-01-fail-close-validation.md"
branch = "codex/auto-fail-close-expanded-catalog"
mode = "resolve"
depends_on = []
instructions = "Implement Phase 1 of docs/rse/specs/plan-expanded-foreground-catalog-repair.md. Fail-close the invalid validation, add the machine-readable failed gate and tests, preserve all findings as superseded evidence, then resolve the ticket only after acceptance checks pass."

[[task]]
id = "freeze-candidate-redshifts"
wave = "first"
ticket = "docs/rse/wayfinder/tickets/expanded-foreground-catalog-repair-08-freeze-candidate-redshift-provenance.md"
branch = "codex/auto-freeze-candidate-redshifts"
mode = "resolve"
depends_on = []
instructions = "Freeze stable source identifiers and hashed source rows or query responses for every adopted candidate redshift. Preserve existing verdicts. Do not re-adjudicate a redshift or budget flag. Stop as blocked if a required source cannot be frozen."

[[task]]
id = "audit-results-library-conflicts"
wave = "first"
ticket = "docs/rse/wayfinder/tickets/authority-16-adjudicate-results-library-byte-conflicts.md"
branch = "codex/auto-audit-results-library-conflicts"
mode = "review"
depends_on = []
expected_artifact = "docs/rse/specs/research-authority-16-results-library-byte-conflicts.md"
instructions = "Produce exact manifests, byte-difference evidence, producing commits, consumers, trust states, recovery evidence, and a non-overwriting disposition with rollback packet for both real-byte conflicts. Do not move, relink, replace, or delete any bytes."

[[task]]
id = "correct-census-wording"
wave = "first"
ticket = "docs/rse/wayfinder/tickets/08-correct-census-aperture-description.md"
branch = "codex/auto-correct-census-wording"
mode = "resolve"
depends_on = []
instructions = "Adopt the ticket's recommended cheap path: describe the frozen census as built, including its observed envelope and provenance-based eligibility logic. Do not rerun or change the census. Stop if the exact wording would materially change a claim."

[[task]]
id = "retire-stage-codes"
wave = "first"
ticket = "docs/rse/wayfinder/tickets/12-retire-letter-number-stage-names.md"
branch = "codex/auto-retire-stage-codes"
mode = "resolve"
depends_on = []
instructions = "Add the complete legacy-code glossary and make CONTEXT.md pending work descriptive-first. Do not rewrite closed handoffs or archived history. Validate links and resolve the ticket."

[[task]]
id = "review-trust-ledger"
wave = "second"
ticket = "docs/rse/wayfinder/tickets/13-overhaul-trust-assessment.md"
branch = "codex/auto-review-trust-ledger"
mode = "review"
depends_on = ["fail-close-expanded-catalog", "freeze-candidate-redshifts", "audit-results-library-conflicts"]
expected_artifact = "docs/rse/specs/research-trust-ledger-overhaul-2026-07-20.md"
instructions = "Produce a row-by-row evidence audit and exact recommended trust-state changes. Do not promote scientific trust or resolve the ticket. End with a completed owner review artifact."

[[task]]
id = "review-count-audit"
wave = "second"
ticket = "docs/rse/wayfinder/tickets/15-count-audit-remediation-standing-method.md"
branch = "codex/auto-review-count-audit"
mode = "review"
depends_on = ["fail-close-expanded-catalog", "freeze-candidate-redshifts", "audit-results-library-conflicts"]
expected_artifact = "docs/rse/specs/research-count-audit-remediation-2026-07-20.md"
instructions = "Run the count-method comparisons and prepare an exact decision packet. Do not adopt morphology-dependent count changes or resolve the ticket. Stop at owner visual review."
