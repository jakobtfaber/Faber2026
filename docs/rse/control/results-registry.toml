# Results registry — canonical inventory of every manuscript-facing result.
# Owner decisions 2026-07-18: TOML canonical + generated RESULTS.md view
# (sync_state pattern); scope = manuscript-facing products only (numbers,
# tables, figures, verdicts quoted or shown in the tex); this inventory is
# PHASE 1 of the trust-ledger overhaul (wayfinder ticket 13) — the overhaul
# adjudicates trust row-by-row on top of it. The tier-2 prose-number parity
# CI gate (verification-protocol.md) checks tex against THIS file.
#
# Field reference (one [[result]] per product):
#   id                stable dotted id: <area>.<name>
#   section           manuscript unit consuming it (S2, S4.1, App.C, ...)
#   kind              number | table | figure | figure_set | verdict
#   description       one line, plain language
#   value             the quoted value (numbers/verdicts) or "" (tables/figures)
#   units             "" if dimensionless/na
#   producing_script  repo-relative path (pipeline/ or scripts/)
#   pipeline_pin      submodule commit at production ("" = confirm per-artifact;
#                     current gitlink 23fbd295)
#   inputs            in-repo data artifacts consumed
#   external_sources  third-party queries: catalog/survey, version/DR, DOI,
#                     query date — one string each
#   artifact          output path (+ md5 where applicable)
#   consumed_by       tex locations quoting/showing it
#   trust             trusted | revoked | pending
#   cleared_by        which validation cleared it ("" if revoked/pending)
#   current           true | false (false = superseded; keep row for history)
#   notes             free text; "VERIFY:" marks fields to confirm during the
#                     dispersion sweep
#
# STATUS: population pass 1 (2026-07-18) — product-level rows (tables,
# figures, headline numbers/verdicts). Granular prose numbers enter when the
# tier-2 extractor lands. Trust seeded from the CONTEXT.md ledger as of
# 2026-07-18; the wf-13 overhaul re-adjudicates row-by-row.

